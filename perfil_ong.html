<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Perfil ONG</title>
    <link rel="stylesheet" href="perfil_ong.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span class="heart-icon">❤️</span>
        <span class="logo-text">AdotaPet</span>
    </div>
    <nav class="nav-links">
        <a href="feed.html"><i class="fas fa-home"></i> Feed</a>
        <a href="solicitacoes.html"><i class="fas fa-clipboard-list"></i> Solicitações</a>
        <a href="chat.html"><i class="fas fa-comment-dots"></i> Chat</a>
        <a href="perfil_ong.html" class="active"><i class="fas fa-user"></i> Perfil</a>
        <a href="login.html"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </nav>
</header>

<main class="container">
    <section class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-building"></i>
            </div>
            <div class="profile-info">
                <div class="name-tag">
                    <h2>Esperança</h2>
                    <span class="badge">ONG</span>
                </div>
                <p class="email"><i class="far fa-envelope"></i> ONG_Esperanca@gmail.com</p>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box available">
                <div class="stat-label"><i class="fas fa-paw"></i> Disponíveis</div>
                <div class="stat-number" id="count-disp">0</div>
            </div>
            <div class="stat-box adopted">
                <div class="stat-label"><i class="far fa-check-circle"></i> Adotados</div>
                <div class="stat-number">0</div>
            </div>
        </div>

        <a href="cadastrar_animal.html" class="btn-primary-ong">
            <i class="fas fa-plus"></i> Adicionar Novo Animal
        </a>
    </section>

    <section class="interests-section">
        <h3 class="section-title"><i class="fas fa-th-large"></i> Seus Animais Cadastrados</h3>
        <div class="pet-grid" id="pet-grid-ong">
            <p class="empty-msg" id="msg-vazia">Nenhum animal cadastrado no momento.</p>
        </div>
    </section>
</main>
 
</body>
</html>
