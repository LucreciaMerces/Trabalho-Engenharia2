<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Chat</title>
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="heart-icon">❤️</span>
            <span class="logo-text">AdotaPet</span>
        </div>
        <nav class="nav-links">
            <a href="feed.html"><i class="fas fa-home"></i> Feed</a>
            <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i> Chat</a>
            <a href="perfil.html"><i class="far fa-user"></i> Perfil</a>
            <a href="login.html"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </nav>
    </header>

    <main class="container">
        <div class="hero-text">
            <h1>Mensagens</h1>
            <p>Converse sobre os critérios de adoção</p>
        </div>

        <div class="chat-wrapper">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <i class="far fa-comment"></i> <span>Conversas</span>
                </div>
                <div class="contact-list" id="contactList">
                    </div>
            </aside>

            <section class="chat-window">
                <div class="chat-header" id="chatHeader">
                    <div class="avatar-pink small"><i class="fas fa-building"></i></div>
                    <div class="header-info">
                        <strong id="currentPartnerName">Selecione uma conversa</strong>
                        <span class="status" id="currentPartnerStatus">Aguardando...</span>
                    </div>
                </div>

                <div class="chat-messages" id="chatContainer">
                    <div class="empty-state">
                        <i class="far fa-comments"></i>
                        <p>Clique em um contato ao lado para carregar o chat.</p>
                    </div>
                </div>

                <form class="chat-input-area" id="messageForm">
                    <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script src="chat.js"></script>
</body>
</html>
