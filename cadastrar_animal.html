<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Adicionar Novo Animal</title>

   
    <link rel="stylesheet" href="perfil_ong.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
       
        :root {
            --primary-gradient: linear-gradient(90deg, #FF7E21, #F22987);
            --pink: #F22987;
            --border: #EEEEEE;
        }

        #modalAdicionar {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-box {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        .modal-header {
            background: var(--primary-gradient);
            padding: 30px 32px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 24px;
            font-weight: 600;
        }

        .plus-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.25);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        .modal-body {
            padding: 35px 32px 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 9px;
        }

        .required {
            color: #ff4d4d;
        }

        .input-field {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
        }

        .input-field:focus {
            border-color: var(--pink);
            box-shadow: 0 0 0 4px rgba(242, 41, 135, 0.15);
            outline: none;
        }

        .textarea {
            min-height: 125px;
            resize: vertical;
        }

        .hint {
            font-size: 13.5px;
            color: #888;
            margin-top: 6px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .btn-cancel {
            flex: 1;
            padding: 16px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-adicionar {
            flex: 1;
            padding: 16px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

  
    <div id="modalAdicionar">
        <div class="modal-box">

            <div class="modal-header">
                <div class="modal-title">
                    <span class="plus-icon">+</span>
                    Adicionar Novo Animal
                </div>
                <button id="btnFecharModal" class="close-btn">×</button>
            </div>

            <div class="modal-body">
                <form id="formNovoAnimal">

                    <div class="form-group">
                        <label>Nome do Animal <span class="required">*</span></label>
                        <input type="text" id="nomeAnimal" class="input-field" placeholder="Ex: Mel, Thor, Luna..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Espécie <span class="required">*</span></label>
                            <select id="especie" class="input-field" required>
                                <option value="">Selecione</option>
                                <option value="cachorro">🐶 Cachorro</option>
                                <option value="gato">🐱 Gato</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Raça <span class="required">*</span></label>
                            <input type="text" id="raca" class="input-field" placeholder="Ex: Golden Retriever, Vira-lata..." required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Idade <span class="required">*</span></label>
                            <input type="text" id="idade" class="input-field" placeholder="Ex: 3 anos, 6 meses..." required>
                        </div>
                        <div class="form-group">
                            <label>Gênero <span class="required">*</span></label>
                            <select id="genero" class="input-field" required>
                                <option value="">Selecione</option>
                                <option value="macho">Macho</option>
                                <option value="femea">Fêmea</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>URL da Foto <span class="required">*</span></label>
                        <input type="url" id="urlFoto" class="input-field" placeholder="https://exemplo.com/foto-do-animal.jpg" required>
                        <p class="hint">Cole o link de uma imagem (Unsplash, Imgur, etc)</p>
                    </div>

                    <div class="form-group">
                        <label>Descrição <span class="required">*</span></label>
                        <textarea id="descricao" class="input-field textarea" rows="4" 
                                  placeholder="Conte sobre a personalidade, temperamento e necessidades do animal..." required></textarea>
                    </div>

                    <div class="modal-buttons">
                        <button type="button" id="btnCancelarModal" class="btn-cancel">Cancelar</button>
                        <button type="submit" class="btn-adicionar">
                            <i class="fas fa-plus"></i> Adicionar Animal
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalAdicionar');
    const form = document.getElementById('formNovoAnimal');
    const btnFechar = document.getElementById('btnFecharModal');
    const btnCancelar = document.getElementById('btnCancelarModal');

    function fecharModal() {
        modal.style.display = "none";
    }

    btnFechar.addEventListener('click', fecharModal);
    btnCancelar.addEventListener('click', fecharModal);

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        alert("✅ Animal cadastrado com sucesso!");
        form.reset();

        setTimeout(() => {
            fecharModal();
        }, 800);
    });
    </script>

</body>
</html>
