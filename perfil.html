<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Perfil</title>

    <link rel="stylesheet" href="perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span class="heart-icon">❤️</span>
        <span class="logo-text">AdotaPet</span>
    </div>

    <nav class="nav-links">
        <a href="feed.html"><i class="fas fa-home"></i> Feed</a>
        <a href="chat.html"><i class="fas fa-comment-dots"></i> Chat</a>
        <a href="perfil.html" class="active"><i class="far fa-user"></i> Perfil</a>
        <a href="login.html"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </nav>
</header>

<main class="container">
    <section class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>

            <div class="profile-info">
                <div class="name-tag">
                    <h2>lucreciamerness</h2>
                    <span class="badge">Adotante</span>
                </div>
                <p class="email"><i class="far fa-envelope"></i> lucreciamerness@gmail.com</p>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box interest">
                <div class="stat-label">
                    <i class="far fa-heart"></i> Interesses
                </div>
                <div class="stat-number">1</div>
            </div>

            <div class="stat-box adoption">
                <div class="stat-label">
                    <i class="far fa-check-circle"></i> Adoções
                </div>
                <div class="stat-number">0</div>
            </div>
        </div>
    </section>

    <section class="interests-section">
        <h3 class="section-title"><i class="far fa-heart"></i> Animais de interesse</h3>

        <div class="pet-grid">
            <div class="pet-card">
                <div class="pet-image-container">
                    <img src="https://images.unsplash.com/photo-1552053831-71594a27632d?auto=format&fit=crop&w=600" alt="Mel">
                    
                    <button class="fav-btn active">
                        <i class="fas fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="perfil.js"></script>

</body>
</html>
