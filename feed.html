<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Feed</title>
    <link rel="stylesheet" href="feed.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span class="heart-icon">❤️</span>
        <span class="logo-text">AdotaPet</span>
    </div>
    <nav class="nav-links">
        <a href="feed.html" class="active"><i class="fas fa-home"></i> Feed</a>
        <a href="chat.html"><i class="far fa-comment-dots"></i> Chat</a>
        <a href="perfil.html"><i class="far fa-user"></i> Perfil</a>
        <a href="login.html"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </nav>
</header>

<main class="container">
    <section class="hero">
        <h1>Animais disponíveis para adoção</h1>
        <p>Encontre seu novo melhor amigo</p>
    </section>

    <section class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Buscar por nome ou raça...">
        </div>
        <button class="filter-btn"><i class="fas fa-sliders-h"></i> Filtros</button>
    </section>

    <div class="pet-grid" id="petGrid"></div>
</main>

<script src="feed.js"></script>
</body>
</html>
